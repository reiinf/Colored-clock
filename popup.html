<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colored Clock</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Row 1: Icon source + clock style ────────────────────────────────── -->
  <div class="section toggle-section">
    <span class="label">Иконка:</span>
    <div class="toggle-group">
      <button class="toggle-btn active" id="modeSchedule">Расписание</button>
      <button class="toggle-btn" id="modeHistory">История</button>
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="styleHands">🕐</button>
      <button class="toggle-btn" id="styleDigits">12</button>
    </div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="format24">24ч</button>
      <button class="toggle-btn" id="format12">AM/PM</button>
    </div>
  </div>

  <!-- ── Block 1: Schedule ────────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Расписание</div>

    <div class="palette">
      <button class="palette-btn active" data-color="null"   title="Очистить">✕</button>
      <button class="palette-btn"        data-color="green"  title="Хорошо"></button>
      <button class="palette-btn"        data-color="yellow" title="Внимание"></button>
      <button class="palette-btn"        data-color="red"    title="Плохо"></button>
    </div>

    <div class="bar-wrap">
      <div class="bar" id="scheduleBar"></div>
      <div class="time-marker" id="scheduleMarker"></div>
    </div>
    <div class="bar-labels" id="scheduleLabels"></div>
  </div>

  <!-- ── Block 2: History ─────────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">История (типичный день)</div>

    <div class="bar-wrap">
      <div class="bar" id="historyBar"></div>
      <div class="time-marker" id="historyMarker"></div>
    </div>
    <div class="bar-labels" id="historyLabels"></div>

    <div class="entry-form">
      <span class="entry-time" id="entryTime">--:--</span>
      <select id="trendSelect">
        <option value="↓">↓  Ниже нормы</option>
        <option value="=" selected>= Норма</option>
        <option value="↑">↑  Выше нормы</option>
        <option value="↑↑">↑↑ Чрезмерно</option>
      </select>
      <button id="saveEntry">Сохранить</button>
    </div>
  </div>

  <!-- ── Data export / import ─────────────────────────────────────────────── -->
  <div class="section data-section">
    <button id="exportBtn">⬇ Экспорт</button>
    <button id="importBtn">⬆ Импорт</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
